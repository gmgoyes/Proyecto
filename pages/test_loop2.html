        //Contar los múltiplos de 17 entre los primeros 1000 numeros naturales 

        let count = 0;

            if(i%17 === 0){
                count = count + 1;
                //count++;
            }
        }
        console.log(`La cantidad de multiplos de 17 entre los primeros 1000 numeros es ${count}`);

        //Mostrar los números entre el 1 y el 100 que no sean multiplos de 2 ni de 5

         let numero = 1;
         while (numero <= 100) {
            if(numero % 2 !== 0 && numero % 5 !==0){
                console.log(numero);
            }

         }
