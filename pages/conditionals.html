<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condicionales</title>
</head>
<body>

    <script>

        //Prompt permite leer un valor desde teclado
        let edad = prompt("Diga su edad");

        if(edad >= 18)
            alert("Usted es MAYOR de edad");
        else
            alert("Usted es MENOR de edad");



            //
            let calificación = prompt("Introdusca su calificación")
            if (calificación < 3.5)
                alert("Desempeño BAJO");
            else if (calificación < 4)
                alert("Desempeño BASICO");
            else if (calificación < 4.5)
                alert("Desempeño ALTO");
            else if (calificación <= 5)-
                alert("Desempeño SUPERIOR");
            else
                alert("La calificación no es válida");
        

    </script>   
</body>
</html>
